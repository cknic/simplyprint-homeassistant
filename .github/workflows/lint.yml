name: Lint

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/simplyprint
      - run: ruff format --check custom_components/simplyprint
